# fly.toml — APS EDU Backend
# Documentação: https://fly.io/docs/reference/configuration/

app = "aps-edu-api"
primary_region = "gru"  # São Paulo, Brasil

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  # As demais variáveis (DATABASE_URL, JWT_SECRET, etc.) devem ser configuradas
  # via: fly secrets set NOME=VALOR

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "npx prisma migrate deploy"

[[statics]]
  guest_path = "/app/public"
  url_prefix = "/public"
