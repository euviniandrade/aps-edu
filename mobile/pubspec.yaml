name: aps_edu
description: APS EDU — Sistema de Gestão Educacional

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^14.0.0

  # HTTP
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Storage local
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1
  firebase_storage: ^12.0.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # Utils
  image_picker: ^1.1.1
  file_picker: ^8.0.2
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  package_info_plus: ^8.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
