version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aps_edu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aps_user
      POSTGRES_PASSWORD: aps_password
      POSTGRES_DB: aps_edu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aps_edu_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    container_name: aps_edu_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
